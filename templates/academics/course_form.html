{% extends 'base.html' %}
{% block title %}Cours{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{% if view.object %}Modifier le cours{% else %}Nouveau cours{% endif %}</h1>
<div class="card shadow-sm"><div class="card-body">
    <form method="post">
        {% csrf_token %}
        {% include 'academics/partials/form_fields.html' %}
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-outline-secondary" href="{% url 'course_list' %}">Annuler</a>
        </div>
    </form>
</div></div>
{% endblock %}
