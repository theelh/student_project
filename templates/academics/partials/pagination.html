{% if is_paginated %}
<div class="card-footer bg-white">
    <nav aria-label="Pagination">
        <ul class="pagination justify-content-center mb-0">
            {% if page_obj.has_previous %}
                <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if q %}&q={{ q }}{% endif %}{% if selected_program %}&program={{ selected_program }}{% endif %}{% if selected_classroom %}&classroom={{ selected_classroom }}{% endif %}{% if selected_status %}&status={{ selected_status }}{% endif %}">Précédent</a></li>
            {% else %}
                <li class="page-item disabled"><span class="page-link">Précédent</span></li>
            {% endif %}
            <li class="page-item disabled"><span class="page-link">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span></li>
            {% if page_obj.has_next %}
                <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}{% if q %}&q={{ q }}{% endif %}{% if selected_program %}&program={{ selected_program }}{% endif %}{% if selected_classroom %}&classroom={{ selected_classroom }}{% endif %}{% if selected_status %}&status={{ selected_status }}{% endif %}">Suivant</a></li>
            {% else %}
                <li class="page-item disabled"><span class="page-link">Suivant</span></li>
            {% endif %}
        </ul>
    </nav>
</div>
{% endif %}
